services:
  - type: web
    name: gate-calculator
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app -c gunicorn_config.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: STORAGE_TYPE
        value: local
